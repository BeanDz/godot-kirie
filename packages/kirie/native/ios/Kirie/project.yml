name: Kirie

options:
  minimumXcodeGenVersion: 2.38.0
  developmentLanguage: en
  createIntermediateGroups: false

configs:
  Debug: debug
  ReleaseDebug: release
  Release: release

packages:
  SwiftCBOR:
    url: https://github.com/valpackett/SwiftCBOR.git
    branch: master

targets:
  Kirie:
    type: framework
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Kirie
    settings:
      base:
        PRODUCT_NAME: Kirie
        PRODUCT_BUNDLE_IDENTIFIER: ai.moeru.godot.kirie.ios
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: 6.0
        DEFINES_MODULE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        SKIP_INSTALL: NO
        MACH_O_TYPE: staticlib
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CLANG_ENABLE_MODULES: YES
        OTHER_CFLAGS:
          - "$(inherited)"
          - "-fcxx-modules"
          - "-fmodules"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(GODOT_SOURCE_ROOT)"
          - "$(GODOT_SOURCE_ROOT)/core"
          - "$(GODOT_SOURCE_ROOT)/platform/ios"
          - "$(SRCROOT)/../../../../../godot"
      configs:
        Debug:
          GCC_PREPROCESSOR_DEFINITIONS:
            - "$(inherited)"
            - "PTRCALL_ENABLED"
            - "TYPED_METHOD_BIND"
            - "DEBUG_ENABLED"
            - "DEBUG_MEMORY_ALLOC"
            - "DISABLE_FORCED_INLINE"
        ReleaseDebug:
          GCC_PREPROCESSOR_DEFINITIONS:
            - "$(inherited)"
            - "PTRCALL_ENABLED"
            - "TYPED_METHOD_BIND"
            - "DEBUG_ENABLED"
            - "DEBUG_MEMORY_ALLOC"
            - "DISABLE_FORCED_INLINE"
        Release:
          GCC_PREPROCESSOR_DEFINITIONS:
            - "$(inherited)"
            - "PTRCALL_ENABLED"
            - "TYPED_METHOD_BIND"
    dependencies:
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
      - package: SwiftCBOR
  KirieIpcSerializationTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Kirie/KirieIpcPacketCodec.swift
      - path: Tests/KirieIpcSerializationTests
    settings:
      PRODUCT_NAME: KirieIpcSerializationTests
      PRODUCT_BUNDLE_IDENTIFIER: ai.moeru.godot.kirie.ios.ipcSerializationTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: 6.0
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
    dependencies:
      - sdk: XCTest.framework
      - package: SwiftCBOR

schemes:
  KirieIpcSerializationTests:
    build:
      targets:
        KirieIpcSerializationTests: all
    test:
      targets:
        - KirieIpcSerializationTests
