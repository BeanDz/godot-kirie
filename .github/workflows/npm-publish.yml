name: Publish npm Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  packages:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Install Node
        uses: jdx/mise-action@v3
        with:
          install: true
          install_args: node
          cache: true

      - name: Enable Corepack
        run: mise x -- corepack enable pnpm

      - name: Install pnpm dependencies
        run: mise x -- corepack pnpm install --frozen-lockfile

      - name: Typecheck packages
        run: mise run typecheck

      - name: Build packages
        run: mise run build:packages

      - name: Dry-run publish npm packages
        run: mise x -- corepack pnpm publish -r --access public --no-git-checks --dry-run

      - name: Publish npm packages
        if: github.event_name == 'push'
        run: mise x -- corepack pnpm publish -r --access public --no-git-checks
